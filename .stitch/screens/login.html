<!DOCTYPE html>
<html class="light" lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BookStep 로그인</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="../shared/completion-modal.css" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        background: "#f3faff", surface: "#f3faff", "surface-soft": "#F4F7FB",
        "surface-container": "#dbf1fe", "surface-container-highest": "#cfe6f2",
        "surface-container-lowest": "#ffffff", primary: "#005da7", "on-primary": "#ffffff",
        "on-surface": "#071e27", "on-surface-variant": "#414751", outline: "#717783",
        "status-available": "#4CAF50", error: "#ba1a1a", "error-container": "#ffdad6",
        "warm-orange": "#F5A623", "step-blue": "#4A90E2"
      },
      fontFamily: {
        "body-md": ["Be Vietnam Pro"], "headline-md": ["Plus Jakarta Sans"],
        "headline-lg-mobile": ["Plus Jakarta Sans"], "label-md": ["Plus Jakarta Sans"]
      }
    }
  }
};
</script>
<style>
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
body { min-height: max(884px, 100dvh); }
</style>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen">
<main class="container mx-auto min-h-screen flex items-center justify-center px-5 py-10">
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl p-8 shadow-xl border border-surface-container">
<div class="flex items-center gap-2 mb-6">
<span class="material-symbols-outlined text-primary text-3xl">menu_book</span>
<span class="font-headline-md text-headline-md font-bold text-primary">BookStep</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-1">로그인</h1>
<p class="text-on-surface-variant font-body-md mb-6">가입한 이메일과 비밀번호로 로그인하세요.</p>
<p class="hidden mb-4 rounded-xl bg-error-container text-error px-4 py-3 text-sm" id="loginError">이메일 또는 비밀번호가 일치하지 않습니다.</p>
<form class="space-y-5" id="loginForm">
<div class="space-y-2">
<label class="font-label-md text-label-md block" for="email">이메일</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full pl-12 pr-4 py-4 rounded-xl bg-surface-soft border border-surface-container-highest focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none" id="email" placeholder="you@example.com" required type="email"/>
</div>
</div>
<div class="space-y-2">
<label class="font-label-md text-label-md block" for="password">비밀번호</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full pl-12 pr-4 py-4 rounded-xl bg-surface-soft border border-surface-container-highest focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none" id="password" placeholder="••••••••" required type="password"/>
</div>
</div>
<button class="w-full h-14 bg-primary text-on-primary font-headline-md rounded-xl shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
로그인
<span class="material-symbols-outlined">login</span>
</button>
</form>
<p class="text-center pt-5 text-sm text-on-surface-variant">
계정이 없으신가요?
<a class="text-primary font-label-md hover:underline" href="signup.html">회원가입</a>
</p>
</div>
</main>
<div class="hidden" id="completion-modal" role="dialog" aria-modal="true" aria-labelledby="completion-modal-title">
<div class="modal-panel">
<div class="modal-icon"><span class="material-symbols-outlined text-[28px]" id="completion-modal-icon">check_circle</span></div>
<h2 class="modal-title" id="completion-modal-title">완료</h2>
<p class="modal-message" id="completion-modal-message"></p>
<button type="button" id="completion-modal-close">확인</button>
</div>
</div>
<script src="../shared/completion-modal.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const error = document.getElementById('loginError');
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  error.classList.add('hidden');
  if (!email || !password) {
    error.textContent = '이메일과 비밀번호를 입력해 주세요.';
    error.classList.remove('hidden');
    return;
  }
  showCompletionModal('login');
  setTimeout(() => { window.location.href = 'main-home.html'; }, 1500);
});
</script>
</body>
</html>
